        <style>
            /* First Coffee font: Used for subtitles, like in the actual stream */
            @font-face {
                font-family: 'First Coffee';
                src: url('Fonts/First Coffee.ttf');

            /* Sobiscuit font: Used for the title of the website. It is the font used for the official Neuro-sama logo */

            body {

                background-attachment: fixed;

            h1 {

                color: #bbfdff;

                    2px 2px 0 #000000;

            }
            p {

            }
            /* Styles for the sound effects buttons */
            .sfxBtn {
                background-color: #FFFFFF;
                border: none;
                color: black;
                padding: 16px 16px;
                text-align: center;
                text-decoration: none;
                text-shadow: 1px 1px #bebebe;
                font-family: Helvetica, Arial, sans-serif;
                display: inline-block;
                font-size: 16px;
                margin: 4px 2px;
                cursor: pointer;
                box-shadow: 2px 2px
            }
            /* Styles for other buttons */
            .otrBtn {
                background-color: #FFFFFF;
                border: none;
                color: black;
                padding: 6px 6px;
                text-align: center;
                text-decoration: none;
                text-shadow: 1px 1px #bebebe;
                font-family: Helvetica, Arial, sans-serif;
                display: inline-block;
                font-size: 14px;
                margin: 4px 2px;
                cursor: pointer;
                box-shadow: 2px 2px
            }
            .right {
                float: right;
            }
            .left {

            }
            /* Styles for the reset subtitles button id */
            #rstBtn {
                position: fixed;
                bottom: 4px;
                left: 4px;

            }
            /* Styles for the subtitles toggle button id */

                bottom: 4px;
                left: 120px;
                z-index: 2;
            }
            /* Styles for the background image toggle button id */
            #bgiTgBtn {

                bottom: 4px;
                right: 4px;
                z-index: 2;
            }
            /* Styles for the subtitles id */
            #subtitles {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                /* text */
                color: white;
                text-align: center;
                padding: 32px 0px;
                margin: 0px auto;
                z-index: 1;
                display: none;
                font-family: 'First Coffee', Helvetica, sans-serif;
                font-size: clamp(1rem, 2.5vw, 3rem);
                -webkit-text-stroke: 1px #451928;
                text-shadow: 1.5px 1.5px #45192880;
            }
        </style>

        <div id="subtitles"></div> <!-- This is where subtitles is located in -->
        
        <script> // Scripts that play the sound effect, run the subtitles, and reset the subtitles
            const subtitleDisplay = document.getElementById('subtitles');
            const buttons = document.querySelectorAll('.sfxBtn');
            let resetTimer;

            buttons.forEach(button => {
                button.addEventListener('click', () => {
                    // Check if there is a "custom-text" attribute in the button. If no then use the innerText one
                    let text = button.getAttribute('custom-text') || button.innerText;

                    // Add period if no punctuation from the text
                    if (!/[.!?]$/.test(text)) {
                        text += '.';
                    }

                    // Play sound using the "sound" attribute in the button
                    const soundPath = button.getAttribute('sound');
                    new Audio(soundPath).play();
                    
                    // Append the text to existing ones
                    subtitleDisplay.innerText += (subtitleDisplay.innerText ? ' ' : '') + text;

                    // Reset 7 seconds timer on inactivity
                    clearTimeout(resetTimer);
                    resetTimer = setTimeout(() => {
                        subtitleDisplay.innerText = '';
                    }, 7000);
                });
            });

            // Button to reset subtitles if needed
            rstBtn.addEventListener('click', () => {
                subtitleDisplay.innerText = '';
                clearTimeout(inactivityTimer);
            });

            // Button to toggle subtitles
            function toggleSubtitles() {
            var sub = document.getElementById("subtitles");
            var btn = document.getElementById("subTgBtn")
            if (sub.style.display === "block") {
                sub.style.display = "none";
                btn.innerHTML = "Enable Subtitles"
            } else {
                sub.style.display = "block";
                btn.innerHTML = "Disable Subtitles"
            }
            }

            // Background switcher
            const images = [
            null, // No background - Solid color
            'Images/Neuro-sama\ Room.jpg',
            'Images/Neuro-sama\ Room\ Dark.jpg',
            ];

            let currentIndex = 0;
            const btn = document.getElementById('bgiTgBtn');

            btn.addEventListener('click', function() {
                // Increment index and loop back to 0 if at the end
                currentIndex = (currentIndex + 1) % images.length;
                
                // Apply new image to the body background
                document.body.style.backgroundImage = `url('${images[currentIndex]}')`;
            });
        </script>
